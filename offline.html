<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Hey Kopi — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:100svh;
    background:linear-gradient(160deg,#f8f4ee 0%,#f0ebe3 50%,#ede8e0 100%);
    color:#4a3728;text-align:center;padding:28px;
  }
  .ring{
    width:110px;height:110px;border-radius:50%;
    background:#f0ebe3;
    box-shadow:6px 6px 16px rgba(166,148,126,.45),-6px -6px 16px rgba(255,252,244,.9);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
    animation:pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{box-shadow:6px 6px 16px rgba(166,148,126,.45),-6px -6px 16px rgba(255,252,244,.9)}50%{box-shadow:9px 9px 22px rgba(166,148,126,.55),-9px -9px 22px rgba(255,255,255,.95)}}
  .cup-svg{filter:drop-shadow(0 2px 8px rgba(196,154,108,.5))}
  h1{
    font-size:28px;font-weight:600;letter-spacing:2px;margin-bottom:8px;
    background:linear-gradient(135deg,#b8845a,#e8c08a,#c49a6c);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .tag{font-size:11px;color:#9a8472;letter-spacing:4px;text-transform:uppercase;margin-bottom:24px;font-weight:300}
  .card{
    background:#f0ebe3;border-radius:20px;padding:22px 24px;
    box-shadow:6px 6px 16px rgba(166,148,126,.35),-6px -6px 16px rgba(255,252,244,.85);
    max-width:320px;width:100%;margin-bottom:20px;
  }
  .card p{font-size:14px;color:#6b4f3a;line-height:1.75;font-weight:300}
  .card p strong{color:#c49a6c;font-weight:600}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:18px;padding:13px 30px;
    background:linear-gradient(135deg,#d4a96a,#e8c08a,#c49a6c,#b8845a);
    color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:inherit;
    box-shadow:3px 3px 10px rgba(166,148,126,.5),-2px -2px 8px rgba(255,252,244,.7);
    text-decoration:none;
  }
  .btn:active{transform:scale(.96);opacity:.9}
  .tips{font-size:11px;color:#9a8472;margin-top:20px;line-height:1.8;font-weight:300}
  .tips b{color:#c49a6c}
</style>
</head>
<body>
  <div class="ring">
    <svg class="cup-svg" width="52" height="52" viewBox="0 0 56 56" fill="none">
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d4a96a"/>
          <stop offset="30%" stop-color="#e8c08a"/>
          <stop offset="60%" stop-color="#c49a6c"/>
          <stop offset="100%" stop-color="#b8845a"/>
        </linearGradient>
      </defs>
      <path d="M11 22h34l-5 24H16L11 22z" stroke="url(#rg)" stroke-width="2" stroke-linejoin="round"/>
      <path d="M40 26c6 0 10 3 10 7s-4 7-10 7" stroke="url(#rg)" stroke-width="2" stroke-linecap="round"/>
      <path d="M21 16c0-4 3-5 3-9" stroke="url(#rg)" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M29 14c0-4 3-5 3-9" stroke="url(#rg)" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>

  <h1>Hey Kopi</h1>
  <div class="tag">Sedang Offline</div>

  <div class="card">
    <p>Kamu sedang tidak terhubung ke internet.<br><br>
    Data <strong>resep, kalkulator, dan log produksi</strong> tetap tersimpan di HP kamu dan bisa diakses kembali setelah online.</p>
  </div>

  <button class="btn" onclick="location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Coba Lagi
  </button>

  <div class="tips">
    <b>Tips:</b> Sambungkan ke WiFi atau aktifkan data seluler<br>
    untuk sinkronisasi data terbaru.
  </div>
</body>
</html>
