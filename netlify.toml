# ══════════════════════════════════════════════
# HEY KOPI PWA — Netlify Configuration
# Site: https://boisterous-cucurucho-2a78f0.netlify.app
# ══════════════════════════════════════════════

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Global Headers ─────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # PWA
    X-DNS-Prefetch-Control = "on"
    # Allow Telegram to embed
    Content-Security-Policy = "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org"

# ── Cache: HTML (no-cache for updates) ─────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# ── Cache: Service Worker (no-cache!) ──────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# ── OneSignal Service Worker ────────────────────
[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# ── Cache: Manifest ─────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json; charset=utf-8"

# ── Cache: Icons (long cache) ───────────────────
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CORS for fonts/API ──────────────────────────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects: SPA ──────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Edge Functions: Telegram Bot Webhook ────────
# Uncomment when adding bot backend:
# [[edge_functions]]
#   function = "telegram-webhook"
#   path = "/api/telegram"
